name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: read-all

jobs:
  check-semver:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Compare pushed tag with latest release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          LATEST=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q '.tagName' 2>/dev/null || echo "v0.0.0")
          echo "Pushed tag:     $TAG"
          echo "Latest release: $LATEST"
          HIGHER=$(printf '%s\n' "$TAG" "$LATEST" | sort -V | tail -n1)
          if [ "$HIGHER" = "$TAG" ] && [ "$TAG" != "$LATEST" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "$TAG is higher than $LATEST — proceeding."
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "$TAG is not higher than $LATEST — skipping."
          fi

  release:
    needs: check-semver
    if: needs.check-semver.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes

      - name: Update formula url and sha256
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')

          for formula in Formula/brew-snapshot.rb Formula/node-snapshot.rb; do
            sed -i \
              -e "s|url \".*\"|url \"${TARBALL_URL}\"|" \
              -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
              -e "s|version \".*\"|version \"${VERSION}\"|" \
              "$formula"
          done

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/brew-snapshot.rb Formula/node-snapshot.rb
          git commit -m "chore: bump formulas to ${TAG}"
          git push origin main
